<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Food Menu Bar - Aviranjan</title>

  <!-- Favicon (empty to avoid error) -->
  <link rel="icon" href="data:," />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
  />

  <!-- Main CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <section class="menu">

    <!-- Title -->
    <div class="title">
      <h2>Our Menu</h2>
      <div class="underline"></div>
    </div>

    <!-- Filter Buttons -->
    <div class="btn-container"></div>

    <!-- Menu Items -->
    <div class="section-center">

      <!-- Single Item -->
      <article class="menu-item">
        <img src="menu-item.jpeg" class="photo" alt="Buttermilk Pancakes" />

        <div class="item-info">
          <header>
            <h4>Buttermilk Pancakes</h4>
            <h4 class="price">$15</h4>
          </header>

          <p class="item-text">
            Lorem ipsum dolor sit amet, consectetur adipisicing elit.
            Nesciunt ipsum veritatis non quo iste natus error.
          </p>
        </div>
      </article>

    </div>
  </section>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>
